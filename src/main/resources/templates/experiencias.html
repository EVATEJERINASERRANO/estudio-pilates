<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiencias - Coral Pilates Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:#e8ddd2;
            color:#4c4036;
        }

        a{
            text-decoration:none;
        }

        /* HEADER */
        header{
            position:sticky;
            top:0;
            z-index:1000;
            background:#eee2d7;
            border-bottom:1px solid #d5c5b6;
            box-shadow:0 3px 10px rgba(0,0,0,0.03);
        }

        .navbar{
            width:95%;
            max-width:1500px;
            margin:auto;
            min-height:110px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:28px;
        }

        .logo img{
            height:95px;
        }

        .menu{
            display:flex;
            align-items:center;
            gap:28px;
            margin-left:auto;
            flex-wrap:wrap;
        }

        .menu a{
            font-family:'Nunito',sans-serif;
            font-size:19px;
            font-weight:700;
            color:#6f5441;
            position:relative;
        }

        .menu a::after{
            content:"";
            position:absolute;
            left:0;
            bottom:-6px;
            width:0;
            height:2px;
            background:#b28e73;
            transition:0.3s;
        }

        .menu a:hover::after{
            width:100%;
        }

        .login-link{
            padding:10px 18px;
            border-radius:999px;
            background:#b9987f;
            color:#fffaf5 !important;
        }

        /* SECCIÓN EXPERIENCIAS */
        .experiencias-section{
            width:90%;
            max-width:1400px;
            margin:50px auto;
        }

        .experiencias-title{
            text-align:center;
            margin-bottom:30px;
        }

        .experiencias-title h1{
            font-family:'Cormorant Garamond',serif;
            font-size:64px;
            color:#4a3a30;
            margin-bottom:8px;
        }

        .experiencias-title p{
            color:#6b5648;
            font-size:18px;
        }

        .experiencias-grid{
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:25px;
        }

        /* TARJETA */
        .card{
            border-radius:30px;
            overflow:hidden;
            box-shadow:0 15px 30px rgba(0,0,0,0.08);
            position:relative;
            background:#f4ece4;
            cursor:pointer;
        }

        /* CONTENEDOR DE IMAGEN:
           le damos altura pero sin recortar la foto */
        .card-image{
            width:100%;
            height:560px;
            background:#f4ece4;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:10px;
        }

        /* FOTO ENTERA */
        .card img{
            width:100%;
            height:100%;
            object-fit:contain; /* IMPORTANTE: se ve entera */
            transition:transform 0.35s ease;
            display:block;
        }

        /* Hover suave */
        .card:hover img{
            transform:scale(1.03);
        }

        /* Overlay de texto */
        .card-overlay{
            position:absolute;
            inset:0;
            background:rgba(0,0,0,0.28);
            display:flex;
            align-items:center;
            justify-content:center;
            opacity:0;
            transition:0.3s ease;
            pointer-events:none;
        }

        .card:hover .card-overlay{
            opacity:1;
        }

        .card-overlay span{
            color:white;
            font-family:'Cormorant Garamond',serif;
            font-size:30px;
            text-align:center;
            padding:0 20px;
        }

        /* MODAL PARA AMPLIAR */
        .image-modal{
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.82);
            z-index:5000;
            align-items:center;
            justify-content:center;
            padding:40px;
        }

        .image-modal.active{
            display:flex;
        }

        .image-modal img{
            max-width:90vw;
            max-height:88vh;
            object-fit:contain;
            border-radius:20px;
            box-shadow:0 10px 35px rgba(0,0,0,0.35);
            background:white;
        }

        .modal-close{
            position:absolute;
            top:22px;
            right:28px;
            font-size:40px;
            color:white;
            cursor:pointer;
            line-height:1;
        }

        footer{
            background:#dac9ba;
            padding:25px;
            text-align:center;
            margin-top:20px;
        }

        @media (max-width: 1100px){
            .navbar{
                padding:16px 0;
                flex-direction:column;
                justify-content:center;
            }

            .logo img{
                height:85px;
            }

            .menu{
                justify-content:center;
                margin-left:0;
                gap:18px;
            }

            .menu a{
                font-size:17px;
            }

            .experiencias-grid{
                grid-template-columns:repeat(2, 1fr);
            }
        }

        @media (max-width: 768px){
            .experiencias-grid{
                grid-template-columns:1fr;
            }

            .experiencias-title h1{
                font-size:46px;
            }

            .card-image{
                height:520px;
            }
        }

        @media (max-width: 600px){
            .menu{
                gap:14px;
            }

            .menu a{
                font-size:16px;
            }

            .login-link{
                padding:8px 14px;
            }

            .experiencias-title h1{
                font-size:38px;
            }

            .experiencias-title p{
                font-size:16px;
            }

            .card-image{
                height:470px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="navbar">
        <div class="logo">
            <img th:src="@{/images/logo.png}" alt="Logo">
        </div>

        <nav class="menu">
            <a href="/">Inicio</a>
            <a href="/conocenos">Conócenos</a>
            <a href="/experiencias">Experiencias</a>
            <a href="/sesiones-web">Reservas</a>
            <a href="/boutique">Boutique</a>
            <a href="/contacto">Contacto</a>
            <a href="#" class="login-link">Login</a>
        </nav>
    </div>
</header>

<section class="experiencias-section">

    <div class="experiencias-title">
        <h1>Experiencias</h1>
        <p>Descubre una forma diferente de cuidar tu cuerpo y tu mente.</p>
    </div>

    <div class="experiencias-grid">

        <div class="card" onclick="openModal('/images/exp1.png')">
            <div class="card-image">
                <img th:src="@{/images/exp1.png}" alt="Experiencia 1">
            </div>
            <div class="card-overlay"><span>Vitality</span></div>
        </div>

        <div class="card" onclick="openModal('/images/exp2.png')">
            <div class="card-image">
                <img th:src="@{/images/exp2.png}" alt="Experiencia 2">
            </div>
            <div class="card-overlay"><span>Sweet Balance</span></div>
        </div>

        <div class="card" onclick="openModal('/images/exp3.png')">
            <div class="card-image">
                <img th:src="@{/images/exp3.png}" alt="Experiencia 3">
            </div>
            <div class="card-overlay"><span>Wine & Cheese Flow</span></div>
        </div>

        <div class="card" onclick="openModal('/images/exp4.png')">
            <div class="card-image">
                <img th:src="@{/images/exp4.png}" alt="Experiencia 4">
            </div>
            <div class="card-overlay"><span>Relax Serenity</span></div>
        </div>

        <div class="card" onclick="openModal('/images/exp5.png')">
            <div class="card-image">
                <img th:src="@{/images/exp5.png}" alt="Experiencia 5">
            </div>
            <div class="card-overlay"><span>Brunch Glow</span></div>
        </div>

        <div class="card" onclick="openModal('/images/exp6.png')">
            <div class="card-image">
                <img th:src="@{/images/exp6.png}" alt="Experiencia 6">
            </div>
            <div class="card-overlay"><span>Duo Exclusive</span></div>
        </div>

    </div>

</section>

<footer>
    <p>© Coral Pilates Studio</p>
</footer>

<!-- MODAL -->
<div id="imageModal" class="image-modal" onclick="closeModal()">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <img id="modalImg" src="" alt="Imagen ampliada">
</div>

<script>
    function openModal(imageSrc) {
        document.getElementById("modalImg").src = imageSrc;
        document.getElementById("imageModal").classList.add("active");
    }

    function closeModal() {
        document.getElementById("imageModal").classList.remove("active");
    }
</script>

</body>
</html>
