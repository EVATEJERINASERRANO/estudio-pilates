<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Materiales - Coral Pilates Studio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Inter',sans-serif;
            background:#f3ebe4;
            padding:30px;
        }

        h1{
            font-family:'Cormorant Garamond',serif;
            font-size:42px;
            margin-bottom:20px;
        }

        .top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .btn{
            padding:10px 16px;
            border-radius:999px;
            background:#b9987f;
            color:white;
            text-decoration:none;
            font-weight:700;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:20px;
            margin-bottom:14px;
            box-shadow:0 6px 14px rgba(0,0,0,0.06);
        }

        .title{
            font-weight:800;
            font-size:18px;
            margin-bottom:6px;
        }

        .desc{
            font-size:14px;
            margin-bottom:8px;
            color:#6a5446;
        }

        iframe{
            width:100%;
            height:200px;
            border-radius:12px;
        }

        .back{
            display:inline-block;
            margin-bottom:16px;
            color:#7b604c;
            text-decoration:none;
            font-weight:700;
        }
    </style>
</head>

<body>

<a th:href="@{/admin}" class="back">← Volver al admin</a>

<div class="top">
    <h1>Materiales / vídeos</h1>
    <a th:href="@{/admin/materiales/nuevo}" class="btn">Nuevo material</a>
</div>

<div th:if="${mensajeOk}" style="margin-bottom:12px; padding:10px; background:#e8f3ea; color:#315c38; border-radius:10px;">
    <span th:text="${mensajeOk}"></span>
</div>

<div th:each="m : ${materiales}" class="card">

    <div class="title" th:text="${m.titulo}">Título</div>
    <div class="desc" th:text="${m.descripcion}">Descripción</div>

    <iframe th:src="${m.url}" frameborder="0" allowfullscreen></iframe>

</div>

</body>
</html>
