<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiales - Coral Pilates Studio</title>


    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/private.css">
</head>

<body class="admin-materiales-page">

<a th:href="@{/admin}" class="back">← Volver al admin</a>

<div class="top">
    <h1>Materiales / vídeos</h1>
    <a th:href="@{/admin/materiales/nuevo}" class="btn">Nuevo material</a>
</div>

<div th:if="${mensajeOk}" class="admin-materiales-alert">
    <span th:text="${mensajeOk}"></span>
</div>

<div th:each="m : ${materiales}" class="card">
    <div class="title" th:text="${m.titulo}">Título</div>
    <div class="desc" th:text="${m.descripcion}">Descripción</div>
    <iframe th:src="${m.url}" frameborder="0" allowfullscreen></iframe>
</div>

</body>
</html>
