<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modo == 'editar' ? 'Editar sesión' : 'Nueva sesión'}">Sesión admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/private.css">
</head>
<body class="admin-sesion-form-page">

<div class="admin-sesion-form-wrap">

    <a th:href="@{/admin/sesiones}" class="admin-sesion-form-back-link">← Volver a agenda admin</a>

    <section class="admin-sesion-form-card">
        <div class="admin-sesion-form-kicker">Coral Pilates Studio</div>

        <h1 th:text="${modo == 'editar' ? 'Editar sesión' : 'Nueva sesión'}">Nueva sesión</h1>

        <p class="admin-sesion-form-intro">
            Completa los datos de la sesión y guárdalos para actualizar la agenda del estudio.
        </p>

        <form th:action="@{/admin/sesiones/guardar}" method="post">
            <input type="hidden" name="id" th:value="${sesion.id}">

            <div class="admin-sesion-form-grid-two">
                <div class="admin-sesion-form-group">
                    <label class="admin-sesion-form-label" for="fecha">Fecha</label>
                    <input class="admin-sesion-form-input" type="date" id="fecha" name="fecha"
                           th:value="${sesion.fecha}" required>
                </div>

                <div class="admin-sesion-form-group">
                    <label class="admin-sesion-form-label" for="hora">Hora</label>
                    <input class="admin-sesion-form-input" type="time" id="hora" name="hora"
                           th:value="${sesion.hora}" required>
                </div>
            </div>

            <div class="admin-sesion-form-grid-two">
                <div class="admin-sesion-form-group">
                    <label class="admin-sesion-form-label" for="plazasDisponibles">Plazas disponibles</label>
                    <input class="admin-sesion-form-input" type="number" id="plazasDisponibles" name="plazasDisponibles"
                           min="0" th:value="${sesion.plazasDisponibles}" required>
                </div>

                <div class="admin-sesion-form-group">
                    <label class="admin-sesion-form-label" for="claseId">Clase</label>
                    <select class="admin-sesion-form-select" id="claseId" name="claseId" required>
                        <option value="">Selecciona una clase</option>
                        <option th:each="clase : ${clases}"
                                th:value="${clase.id}"
                                th:text="${clase.nombre}"
                                th:selected="${sesion.clase != null and sesion.clase.id == clase.id}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="admin-sesion-form-actions">
                <button type="submit" class="admin-sesion-form-primary-button"
                        th:text="${modo == 'editar' ? 'Guardar cambios' : 'Crear sesión'}">
                    Crear sesión
                </button>

                <a th:href="@{/admin/sesiones}" class="admin-sesion-form-secondary-button">Cancelar</a>
            </div>
        </form>
    </section>

</div>

</body>
</html>
