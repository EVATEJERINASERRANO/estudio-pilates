<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${modo == 'editar' ? 'Editar sesión' : 'Nueva sesión'}">Sesión admin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            color:#4c4036;
            min-height:100vh;
            background:
                    radial-gradient(circle at top left, rgba(255,248,242,0.95), rgba(245,238,232,1) 45%),
                    linear-gradient(180deg, #f7f1eb 0%, #efe5dc 100%);
            padding:30px 20px;
        }

        .page-wrap{
            width:92%;
            max-width:760px;
            margin:0 auto;
        }

        .back-link{
            display:inline-block;
            margin-bottom:18px;
            color:#7b604c;
            text-decoration:none;
            font-weight:700;
        }

        .form-card{
            background:rgba(255,255,255,0.86);
            border:1px solid rgba(191,160,133,0.18);
            border-radius:30px;
            padding:30px;
            box-shadow:0 18px 34px rgba(89,66,49,0.08);
        }

        .kicker{
            font-family:'Nunito',sans-serif;
            font-size:13px;
            letter-spacing:2px;
            text-transform:uppercase;
            color:#9b7c65;
            margin-bottom:10px;
            font-weight:700;
        }

        h1{
            font-family:'Cormorant Garamond',serif;
            font-size:52px;
            line-height:0.95;
            color:#4a3a30;
            margin-bottom:12px;
        }

        .intro{
            font-size:16px;
            line-height:1.8;
            color:#5b4b40;
            margin-bottom:24px;
        }

        .form-group{
            margin-bottom:18px;
        }

        .form-label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:700;
            color:#6f5848;
        }

        .form-input,
        .form-select{
            width:100%;
            padding:14px 16px;
            border-radius:16px;
            border:1px solid #dbcbbb;
            background:#fffdfb;
            color:#4c4036;
            font-size:15px;
            font-family:'Inter',sans-serif;
            outline:none;
        }

        .form-input:focus,
        .form-select:focus{
            border-color:#b9987f;
            box-shadow:0 0 0 4px rgba(185,152,127,0.16);
        }

        .grid-two{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:16px;
        }

        .actions{
            display:flex;
            gap:12px;
            flex-wrap:wrap;
            margin-top:10px;
        }

        .primary-button,
        .secondary-button{
            padding:14px 20px;
            border:none;
            border-radius:999px;
            font-family:'Nunito',sans-serif;
            font-size:14px;
            font-weight:800;
            text-decoration:none;
            cursor:pointer;
        }

        .primary-button{
            background:#b9987f;
            color:#fffaf5;
        }

        .secondary-button{
            background:#eaded3;
            color:#5a4537;
        }

        @media (max-width: 768px){
            .page-wrap{
                width:95%;
            }

            .form-card{
                padding:22px 18px;
            }

            h1{
                font-size:40px;
            }

            .grid-two{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>

<div class="page-wrap">

    <a th:href="@{/admin/sesiones}" class="back-link">← Volver a agenda admin</a>

    <section class="form-card">
        <div class="kicker">Coral Pilates Studio</div>
        <h1 th:text="${modo == 'editar' ? 'Editar sesión' : 'Nueva sesión'}">Nueva sesión</h1>
        <p class="intro">
            Completa los datos de la sesión y guárdalos para actualizar la agenda del estudio.
        </p>

        <form th:action="@{/admin/sesiones/guardar}" method="post">
            <input type="hidden" name="id" th:value="${sesion.id}">

            <div class="grid-two">
                <div class="form-group">
                    <label class="form-label" for="fecha">Fecha</label>
                    <input class="form-input" type="date" id="fecha" name="fecha"
                           th:value="${sesion.fecha}" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="hora">Hora</label>
                    <input class="form-input" type="time" id="hora" name="hora"
                           th:value="${sesion.hora}" required>
                </div>
            </div>

            <div class="grid-two">
                <div class="form-group">
                    <label class="form-label" for="plazasDisponibles">Plazas disponibles</label>
                    <input class="form-input" type="number" id="plazasDisponibles" name="plazasDisponibles"
                           min="0" th:value="${sesion.plazasDisponibles}" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="claseId">Clase</label>
                    <select class="form-select" id="claseId" name="claseId" required>
                        <option value="">Selecciona una clase</option>
                        <option th:each="clase : ${clases}"
                                th:value="${clase.id}"
                                th:text="${clase.nombre}"
                                th:selected="${sesion.clase != null and sesion.clase.id == clase.id}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="primary-button"
                        th:text="${modo == 'editar' ? 'Guardar cambios' : 'Crear sesión'}">
                    Crear sesión
                </button>

                <a th:href="@{/admin/sesiones}" class="secondary-button">Cancelar</a>
            </div>
        </form>
    </section>

</div>

</body>
</html>
