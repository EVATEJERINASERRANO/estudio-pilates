<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuevo material - Coral Pilates Studio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Inter',sans-serif;
            background:#f3ebe4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .form-card{
            background:white;
            padding:30px;
            border-radius:24px;
            width:100%;
            max-width:520px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        h1{
            font-family:'Cormorant Garamond',serif;
            font-size:36px;
            margin-bottom:20px;
            color:#4a3a30;
        }

        label{
            display:block;
            margin-top:12px;
            font-weight:600;
            color:#5a4537;
        }

        input, textarea{
            width:100%;
            padding:10px;
            border-radius:10px;
            border:1px solid #ddd;
            margin-top:6px;
            font-family:'Inter',sans-serif;
        }

        textarea{
            min-height:120px;
            resize:vertical;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:999px;
            background:#b9987f;
            color:white;
            font-weight:700;
            cursor:pointer;
        }

        .back{
            display:block;
            margin-top:14px;
            text-align:center;
            color:#7b604c;
            text-decoration:none;
        }

        .hint{
            margin-top:8px;
            font-size:13px;
            color:#8a6b55;
            line-height:1.5;
        }
    </style>
</head>
<body>

<div class="form-card">

    <h1>Nuevo material</h1>

    <form th:action="@{/admin/materiales}" method="post" th:object="${material}">

        <label>Título</label>
        <input type="text" th:field="*{titulo}" required>

        <label>Descripción / explicación</label>
        <textarea th:field="*{descripcion}" required></textarea>

        <label>URL del vídeo</label>
        <input type="text" th:field="*{url}" required>

        <div class="hint">
            Usa una URL embebible, por ejemplo de YouTube en formato embed.
        </div>

        <button type="submit">Guardar material</button>

    </form>

    <a th:href="@{/admin/materiales}" class="back">← Volver a materiales</a>

</div>

</body>
</html>
