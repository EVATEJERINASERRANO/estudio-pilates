<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Boutique - Coral Pilates Studio</title>

    <th:block th:replace="fragments/head :: head"></th:block>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:#e8ddd2;
            color:#4c4036;
        }

        a{
            text-decoration:none;
        }

        header{
            position:sticky;
            top:0;
            z-index:1000;
            background:#eee2d7;
            border-bottom:1px solid #d5c5b6;
            box-shadow:0 3px 10px rgba(0,0,0,0.03);
        }

        .navbar{
            width:95%;
            max-width:1500px;
            margin:auto;
            min-height:110px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:28px;
        }

        .logo{
            display:flex;
            align-items:center;
            flex-shrink:0;
        }

        .logo img{
            height:95px;
            width:auto;
            object-fit:contain;
            display:block;
            filter:drop-shadow(0 2px 4px rgba(0,0,0,0.08));
        }

        .menu{
            display:flex;
            align-items:center;
            gap:28px;
            flex-wrap:wrap;
            margin-left:auto;
        }

        .menu a{
            font-family:'Nunito',sans-serif;
            font-size:19px;
            font-weight:700;
            color:#6f5441;
            position:relative;
            transition:color 0.25s ease, transform 0.25s ease;
        }

        .menu a:hover{
            color:#8c6a52;
            transform:translateY(-1px);
        }

        .menu a::after{
            content:"";
            position:absolute;
            left:0;
            bottom:-6px;
            width:0;
            height:2px;
            background:#b28e73;
            transition:width 0.25s ease;
        }

        .menu a:hover::after{
            width:100%;
        }

        .boutique-hero{
            width:90%;
            max-width:1400px;
            margin:42px auto 28px;
            display:grid;
            grid-template-columns:1.1fr 0.9fr;
            gap:24px;
            align-items:stretch;
        }

        .hero-image{
            border-radius:30px;
            overflow:hidden;
            box-shadow:0 18px 34px rgba(0,0,0,0.07);
            min-height:500px;
            cursor:pointer;
        }

        .hero-image img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
            transition:transform 0.4s ease;
        }

        .hero-image:hover img{
            transform:scale(1.03);
        }

        .hero-copy{
            background:rgba(255,255,255,0.74);
            border-radius:30px;
            padding:44px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            box-shadow:0 12px 24px rgba(0,0,0,0.04);
        }

        .hero-kicker{
            font-family:'Nunito',sans-serif;
            font-size:14px;
            letter-spacing:2px;
            text-transform:uppercase;
            color:#9b7c65;
            margin-bottom:14px;
        }

        .hero-copy h1{
            font-size:64px;
            line-height:0.95;
            color:#4a3a30;
            margin-bottom:18px;
        }

        .hero-copy p{
            font-size:17px;
            line-height:1.8;
            color:#5b4b40;
            margin-bottom:14px;
        }

        .swatches{
            display:flex;
            align-items:center;
            gap:12px;
            margin-top:12px;
            flex-wrap:wrap;
        }

        .swatches .label{
            font-size:14px;
            font-weight:600;
            color:#6b5648;
            margin-right:4px;
        }

        .swatch{
            width:22px;
            height:22px;
            border-radius:50%;
            border:1px solid rgba(0,0,0,0.10);
        }

        .swatch-crema{ background:#f1e6db; }
        .swatch-choco{ background:#7b4b38; }
        .swatch-coral{ background:#ddb8ac; }

        .gallery-section{
            width:90%;
            max-width:1400px;
            margin:0 auto 36px;
        }

        .section-title{
            text-align:center;
            margin-bottom:24px;
        }

        .section-title h2{
            font-size:52px;
            color:#4a3a30;
        }

        .gallery-grid{
            display:grid;
            grid-template-columns:repeat(2, 1fr);
            gap:24px;
        }

        .gallery-card{
            border-radius:28px;
            overflow:hidden;
            box-shadow:0 15px 30px rgba(0,0,0,0.08);
            cursor:pointer;
            background:#f4ece4;
        }

        .gallery-card img{
            width:100%;
            height:420px;
            object-fit:cover;
        }

        .catalog-section{
            width:90%;
            max-width:1100px;
            margin:0 auto 34px;
            background:rgba(255,255,255,0.70);
            border-radius:30px;
            padding:36px;
        }

        footer{
            background:#dac9ba;
            padding:25px;
            text-align:center;
            margin-top:24px;
        }
    </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
