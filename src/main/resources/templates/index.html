<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Coral Pilates Studio</title>

    <!-- head común -->
    <th:block th:replace="fragments/head :: head"></th:block>
</head>

<body class="home-page">

<header>
    <div class="navbar">

        <div class="logo">
            <img th:src="@{/images/logo.png}" alt="Logo">
        </div>

        <nav class="menu">
            <a th:href="@{/}">Inicio</a>
            <a th:href="@{/conocenos}">Conócenos</a>
            <a th:href="@{/experiencias}">Experiencias</a>
            <a th:href="@{/login}">Reservas</a>
            <a th:href="@{/boutique}">Boutique</a>
            <a th:href="@{/contacto}">Contacto</a>
        </nav>

    </div>
</header>

<section class="hero">
    <div class="hero-left" id="heroLeft"></div>
    <div class="hero-right" id="heroRight"></div>

    <div class="hero-content">
        <div class="box">
            <h1>Pilates con equilibrio</h1>
            <p>Un espacio natural y elegante para cuidar cuerpo y mente.</p>
        </div>
    </div>
</section>

<footer class="footer">
    <p>© Coral Pilates Studio</p>
    <a class="instagram-link" href="https://www.instagram.com/coral.pilatestudio/" target="_blank">
        Instagram
    </a>
</footer>

<script>
    const images = [
        "/images/slide1.png",
        "/images/slide2.png",
        "/images/slide3.png"
    ];

    let index = 0;

    const left = document.getElementById("heroLeft");
    const right = document.getElementById("heroRight");

    function changeImage() {
        left.style.backgroundImage = `url(${images[index]})`;
        right.style.backgroundImage = `url(${images[index]})`;
        index = (index + 1) % images.length;
    }

    changeImage();
    setInterval(changeImage, 5000);
</script>

</body>
</html>
