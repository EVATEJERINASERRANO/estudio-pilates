<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coral Pilates Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body{
            background:#e8ddd2;
        }

        .hero{
            width:90%;
            max-width:1400px;
            height:480px;
            margin:40px auto;
            border-radius:30px;
            overflow:hidden;
            position:relative;
            display:flex;
            background:#cfbeaf;
        }

        .hero-left{
            width:60%;
            background-size:cover;
            background-position:center;
        }

        .hero-right{
            width:40%;
            background-size:cover;
            background-position:center;
            filter:blur(3px);
            opacity:0.6;
        }

        .hero-content{
            position:absolute;
            right:40px;
            top:50%;
            transform:translateY(-50%);
        }

        .box{
            background:rgba(255,255,255,0.75);
            padding:40px;
            border-radius:25px;
        }

        h1{
            font-size:54px;
            margin-bottom:15px;
        }
    </style>
</head>

<body>

<!-- 🔥 HEADER REUTILIZADO -->
<div th:replace="fragments/header :: header"></div>

<section class="hero">
    <div class="hero-left" id="heroLeft"></div>
    <div class="hero-right" id="heroRight"></div>

    <div class="hero-content">
        <div class="box">
            <h1>Pilates con equilibrio</h1>
            <p>Un espacio natural y elegante para cuidar cuerpo y mente.</p>
        </div>
    </div>
</section>

<!-- 🔥 FOOTER REUTILIZADO -->
<div th:replace="fragments/footer :: footer"></div>

<script>
    const images = [
        "/images/slide1.png",
        "/images/slide2.png",
        "/images/slide3.png"
    ];

    let index = 0;

    const left = document.getElementById("heroLeft");
    const right = document.getElementById("heroRight");

    function changeImage() {
        left.style.backgroundImage = `url(${images[index]})`;
        right.style.backgroundImage = `url(${images[index]})`;
        index = (index + 1) % images.length;
    }

    changeImage();
    setInterval(changeImage, 5000);
</script>

</body>
</html>
