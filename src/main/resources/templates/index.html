<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coral Pilates Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        /* Reset básico de esta vista */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /*  fondo de la home  */
        body{
            background:#e8ddd2;
        }

        /* Enlaces sin subrayado en esta vista */
        a{
            text-decoration:none;
        }

        /* Este header lo dejo aquí porque en index tiene este comportamiento sticky
           y esta barra concreta */
        header{
            position:sticky;
            top:0;
            z-index:1000;
            background:#eee2d7;
            border-bottom:1px solid #d5c5b6;
            box-shadow:0 3px 10px rgba(0,0,0,0.03);
        }

        /* Navbar concreta de la home */
        .navbar{
            width:95%;
            max-width:1500px;
            margin:auto;
            min-height:110px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:28px;
        }

        /* Aquí el logo va más grande y por eso lo dejo en esta página */
        .logo img{
            height:95px;
            width:auto;
        }

        /* Menú propio de esta vista */
        .menu{
            display:flex;
            gap:28px;
            margin-left:auto;
            align-items:center;
        }

        .menu a{
            font-family:'Nunito',sans-serif;
            font-size:19px;
            font-weight:700;
            color:#6f5441;
        }

        .menu a:hover{
            color:#8c6a52;
        }

        /* Hero principal de la home */
        .hero{
            width:90%;
            max-width:1400px;
            height:480px;
            margin:40px auto;
            border-radius:30px;
            overflow:hidden;
            position:relative;
            display:flex;
            background:#cfbeaf;
        }

        .hero-left{
            width:60%;
            background-size:cover;
            background-position:center;
        }

        .hero-right{
            width:40%;
            background-size:cover;
            background-position:center;
            filter:blur(3px);
            opacity:0.6;
        }

        /* Caja flotante del mensaje principal */
        .hero-content{
            position:absolute;
            right:40px;
            top:50%;
            transform:translateY(-50%);
        }

        .box{
            background:rgba(255,255,255,0.75);
            padding:40px;
            border-radius:25px;
        }

        /* En esta home el h1 principal tiene este tamaño concreto */
        h1{
            font-size:54px;
            margin-bottom:15px;
        }

        /* El footer aquí solo necesita fondo y espaciado.
           El estilo del texto y del Instagram ya viene del style.css */
        footer{
            background:#dac9ba;
            padding:25px;
            text-align:center;
        }
    </style>
</head>

<body>

<header>
    <div class="navbar">

        <div class="logo">
            <img th:src="@{/images/logo.png}" alt="Logo">
        </div>

        <nav class="menu">
            <a th:href="@{/}">Inicio</a>
            <a th:href="@{/conocenos}">Conócenos</a>
            <a th:href="@{/experiencias}">Experiencias</a>
            <a th:href="@{/login}">Reservas</a>
            <a th:href="@{/boutique}">Boutique</a>
            <a th:href="@{/contacto}">Contacto</a>
        </nav>

    </div>
</header>

<section class="hero">
    <div class="hero-left" id="heroLeft"></div>
    <div class="hero-right" id="heroRight"></div>

    <div class="hero-content">
        <div class="box">
            <h1>Pilates con equilibrio</h1>
            <p>Un espacio natural y elegante para cuidar cuerpo y mente.</p>
        </div>
    </div>
</section>

<footer class="footer">
    <p>© Coral Pilates Studio</p>
    <a class="instagram-link" href="https://www.instagram.com/coral.pilatestudio/" target="_blank">
        Instagram
    </a>
</footer>

<script>
    const images = [
        "/images/slide1.png",
        "/images/slide2.png",
        "/images/slide3.png"
    ];

    let index = 0;

    const left = document.getElementById("heroLeft");
    const right = document.getElementById("heroRight");

    function changeImage() {
        left.style.backgroundImage = `url(${images[index]})`;
        right.style.backgroundImage = `url(${images[index]})`;
        index = (index + 1) % images.length;
    }

    changeImage();
    setInterval(changeImage, 5000);
</script>

</body>
</html>
