<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cliente - Coral Pilates Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/private.css">
</head>
<body class="admin-usuario-form-page">

<div class="admin-usuario-form-wrap">
    <div class="admin-usuario-form-card">

        <h1>Crear cliente</h1>

        <form th:action="@{/admin/usuarios}" method="post" th:object="${usuario}">

            <div class="admin-usuario-form-group">
                <label class="admin-usuario-form-label">Nombre</label>
                <input class="admin-usuario-form-input" type="text" th:field="*{nombre}" required>
            </div>

            <div class="admin-usuario-form-group">
                <label class="admin-usuario-form-label">Email</label>
                <input class="admin-usuario-form-input" type="email" th:field="*{email}" required>
            </div>

            <div class="admin-usuario-form-group">
                <label class="admin-usuario-form-label">Contraseña</label>
                <input class="admin-usuario-form-input" type="password" th:field="*{password}" required>
            </div>

            <button type="submit" class="admin-usuario-form-button">Crear cliente</button>

            <div th:if="${mensajeError}" class="admin-usuario-form-error">
                <span th:text="${mensajeError}"></span>
            </div>

        </form>

        <a th:href="@{/admin}" class="admin-usuario-form-back">← Volver</a>

    </div>
</div>

</body>
</html>
