<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crear cliente - Coral Pilates Studio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Inter',sans-serif;
            background:#f3ebe4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .form-card{
            background:white;
            padding:30px;
            border-radius:24px;
            width:100%;
            max-width:420px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        h1{
            font-family:'Cormorant Garamond',serif;
            font-size:36px;
            margin-bottom:20px;
            color:#4a3a30;
        }

        label{
            display:block;
            margin-top:12px;
            font-weight:600;
        }

        input{
            width:100%;
            padding:10px;
            border-radius:10px;
            border:1px solid #ddd;
            margin-top:6px;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:999px;
            background:#b9987f;
            color:white;
            font-weight:700;
            cursor:pointer;
        }

        .back{
            display:block;
            margin-top:14px;
            text-align:center;
            color:#7b604c;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="form-card">

    <h1>Crear cliente</h1>

    <form th:action="@{/admin/usuarios}" method="post" th:object="${usuario}">

        <label>Nombre</label>
        <input type="text" th:field="*{nombre}" required>

        <label>Email</label>
        <input type="email" th:field="*{email}" required>

        <label>Contraseña</label>
        <input type="password" th:field="*{password}" required>

        <button type="submit">Crear cliente</button>
        <div th:if="${mensajeError}" style="margin-bottom:14px; padding:12px; border-radius:12px; background:#f8e8e5; color:#9c3f33; font-weight:700;">
            <span th:text="${mensajeError}"></span>
        </div>

    </form>

    <a th:href="@{/admin}" class="back">← Volver</a>

</div>

</body>
</html>
